
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="2; url=https://s.shopee.co.id/20rR7RFOw7">
    <title>Diskon Spesial Untukmu!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            max-width: 90%;
            width: 450px; /* Ukuran maksimal container gambar */
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px; /* Sudut melengkung agar estetik */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* Efek bayangan */
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        /* Efek saat kursor diarahkan ke gambar */
        img:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .text-hint {
            color: #ee4d2d; /* Warna Orange Shopee */
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2em;
        }
        .sub-hint {
            color: #777;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://s.shopee.co.id/20rR7RFOw7">
            <img src="https://imgur.com/uVV6OaS" alt="Klik di sini untuk melihat produk!">
        </a>
        
        <p class="text-hint">KLIK GAMBAR DI ATAS</p>
        <p class="sub-hint">Mengarahkan otomatis dalam 2 detik...</p>
    </div>
    
    <script>
        // Backup redirect pakai JavaScript (tetap 2 detik)
        setTimeout(function(){
            window.location.href = "https://s.shopee.co.id/20rR7RFOw7";
        }, 2000);
    </script>
</body>
</html>
